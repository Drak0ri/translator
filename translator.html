<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IESV Live Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --border: #2a3550;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --success: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #f0f4ff;
    --muted: #6b7a99;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(6,182,212,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(17,24,39,0.8);
    backdrop-filter: blur(12px);
  }

  .logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    letter-spacing: -0.02em;
  }

  header span {
    font-size: 0.8rem;
    color: var(--muted);
    margin-left: auto;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* API Key Setup */
  .setup-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .setup-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .api-row {
    display: flex;
    gap: 10px;
  }

  .api-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-row input:focus { border-color: var(--accent); }

  button {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .key-status {
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .key-status.ok { color: var(--success); }

  /* Language selector */
  .lang-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .lang-section h2 {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .lang-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .lang-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }

  .lang-chip:hover { border-color: var(--accent); }

  .lang-chip.selected {
    background: rgba(59,130,246,0.15);
    border-color: var(--accent);
    color: #93c5fd;
  }

  .lang-chip .remove {
    font-size: 0.7rem;
    opacity: 0.6;
    margin-left: 2px;
  }

  .custom-lang {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .custom-lang input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .custom-lang input:focus { border-color: var(--accent); }

  .btn-sm {
    padding: 10px 16px;
    font-size: 0.8rem;
  }

  /* Main recorder */
  .recorder {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .mic-btn {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    transition: all 0.2s;
    box-shadow: 0 0 0 0 rgba(59,130,246,0.4);
    padding: 0;
  }

  .mic-btn.listening {
    animation: pulse 1.5s infinite;
    background: linear-gradient(135deg, var(--danger), #f97316);
  }

  .mic-btn.translating {
    animation: spin-glow 1s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
    70% { box-shadow: 0 0 0 20px rgba(239,68,68,0); }
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
  }

  @keyframes spin-glow {
    0% { box-shadow: 0 0 12px rgba(59,130,246,0.6); }
    50% { box-shadow: 0 0 28px rgba(6,182,212,0.8); }
    100% { box-shadow: 0 0 12px rgba(59,130,246,0.6); }
  }

  .status-text {
    font-size: 0.9rem;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
  }

  .status-text.active { color: var(--accent2); }
  .status-text.error { color: var(--danger); }

  .input-lang-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .input-lang-row label {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .input-lang-row select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
  }

  /* Transcript & translations */
  .transcript-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-size: 0.95rem;
    color: var(--text);
    min-height: 60px;
    width: 100%;
    line-height: 1.6;
  }

  .transcript-box.empty { color: var(--muted); font-style: italic; }

  /* Translation cards */
  .translations-section h2 {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .translations-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .translation-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    transition: border-color 0.3s;
    position: relative;
    overflow: hidden;
  }

  .translation-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .translation-card.fresh::before { opacity: 1; }

  .translation-card .lang-label {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent2);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .translation-card .speak-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 8px;
    font-size: 0.75rem;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
  }

  .translation-card .speak-btn:hover {
    background: var(--surface);
    color: var(--text);
  }

  .translation-card .translated-text {
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--text);
    min-height: 40px;
  }

  .translation-card .translated-text.loading {
    color: var(--muted);
    font-style: italic;
  }

  /* History */
  .history-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .history-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    padding: 6px 12px;
    font-size: 0.8rem;
    border-radius: 8px;
  }

  .btn-ghost:hover { background: var(--surface); color: var(--text); }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 300px;
    overflow-y: auto;
  }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 0.85rem;
  }

  .history-item .hi-meta {
    color: var(--muted);
    font-size: 0.75rem;
    margin-bottom: 4px;
  }

  .history-item .hi-text { color: var(--text); }

  .empty-state {
    color: var(--muted);
    font-size: 0.85rem;
    font-style: italic;
    text-align: center;
    padding: 20px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">🌐</div>
  <h1>IESV Live Translator</h1>
  <span id="session-info">Session ready</span>
</header>

<div class="container">

  <!-- API Key -->
  <div class="setup-card">
    <h2>Anthropic API Key</h2>
    <div class="api-row">
      <input type="password" id="api-key" placeholder="sk-ant-..." />
      <button onclick="saveKey()">Save Key</button>
    </div>
    <div class="key-status" id="key-status">No key set — enter your Anthropic API key above</div>
  </div>

  <!-- Language Selector -->
  <div class="lang-section">
    <h2>Target Languages for this meeting</h2>
    <div class="lang-grid" id="lang-grid"></div>
    <div class="custom-lang">
      <input type="text" id="custom-lang-input" placeholder="Add another language (e.g. Tigrinya, Pashto...)" />
      <button class="btn-sm" onclick="addCustomLang()">+ Add</button>
    </div>
  </div>

  <!-- Recorder -->
  <div class="recorder">
    <div class="input-lang-row">
      <label>Speaking in:</label>
      <select id="input-lang">
        <option value="en-GB">English</option>
        <option value="sv-SE">Swedish</option>
        <option value="auto">Auto-detect</option>
      </select>
    </div>
    <button class="mic-btn" id="mic-btn" onclick="toggleListening()">🎤</button>
    <div class="status-text" id="status-text">Press mic to start speaking</div>
    <div class="transcript-box empty" id="transcript-box">Your spoken words will appear here...</div>
  </div>

  <!-- Translations -->
  <div class="translations-section" id="translations-section" style="display:none">
    <h2>Live Translations</h2>
    <div class="translations-grid" id="translations-grid"></div>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-header">
      <h2>Session History</h2>
      <button class="btn-ghost" onclick="clearHistory()">Clear</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="empty-state">No translations yet this session</div>
    </div>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────
let apiKey = localStorage.getItem('iesv_api_key') || '';
let selectedLangs = new Set();
let recognition = null;
let isListening = false;
let sessionCount = 0;
let history = [];

// ── Preset Languages ───────────────────────────────────
const presetLangs = [
  'Arabic', 'Somali', 'Dari', 'Tigrinya',
  'Kurdish', 'Turkish', 'Polish', 'Spanish',
  'French', 'German', 'Urdu', 'Hindi',
  'Amharic', 'Farsi', 'Romanian', 'Albanian'
];

// ── Init ───────────────────────────────────────────────
function init() {
  if (apiKey) {
    document.getElementById('api-key').value = apiKey;
    document.getElementById('key-status').textContent = '✓ API key loaded from storage';
    document.getElementById('key-status').classList.add('ok');
  }
  renderLangGrid();
}

function saveKey() {
  const val = document.getElementById('api-key').value.trim();
  if (!val.startsWith('sk-ant-')) {
    document.getElementById('key-status').textContent = '✗ Key should start with sk-ant-';
    document.getElementById('key-status').classList.remove('ok');
    return;
  }
  apiKey = val;
  localStorage.setItem('iesv_api_key', val);
  document.getElementById('key-status').textContent = '✓ Key saved';
  document.getElementById('key-status').classList.add('ok');
}

// ── Languages ──────────────────────────────────────────
function renderLangGrid() {
  const grid = document.getElementById('lang-grid');
  grid.innerHTML = '';
  presetLangs.forEach(lang => {
    const chip = document.createElement('div');
    chip.className = 'lang-chip' + (selectedLangs.has(lang) ? ' selected' : '');
    chip.innerHTML = `${lang}${selectedLangs.has(lang) ? ' <span class="remove">✕</span>' : ''}`;
    chip.onclick = () => toggleLang(lang);
    grid.appendChild(chip);
  });
}

function toggleLang(lang) {
  if (selectedLangs.has(lang)) selectedLangs.delete(lang);
  else selectedLangs.add(lang);
  renderLangGrid();
  updateTranslationCards();
}

function addCustomLang() {
  const input = document.getElementById('custom-lang-input');
  const lang = input.value.trim();
  if (!lang) return;
  if (!presetLangs.includes(lang)) presetLangs.push(lang);
  selectedLangs.add(lang);
  input.value = '';
  renderLangGrid();
  updateTranslationCards();
}

function updateTranslationCards() {
  const section = document.getElementById('translations-section');
  const grid = document.getElementById('translations-grid');

  if (selectedLangs.size === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';

  // Remove cards for deselected langs
  [...grid.children].forEach(card => {
    if (!selectedLangs.has(card.dataset.lang)) card.remove();
  });

  // Add cards for new langs
  selectedLangs.forEach(lang => {
    if (!grid.querySelector(`[data-lang="${lang}"]`)) {
      const card = document.createElement('div');
      card.className = 'translation-card';
      card.dataset.lang = lang;
      card.innerHTML = `
        <div class="lang-label">
          ${lang}
          <button class="speak-btn" onclick="speakTranslation('${lang}')">🔊 Speak</button>
        </div>
        <div class="translated-text" id="trans-${lang.replace(/\s/g,'-')}">—</div>
      `;
      grid.appendChild(card);
    }
  });
}

// ── Speech Recognition ─────────────────────────────────
function toggleListening() {
  if (isListening) stopListening();
  else startListening();
}

function startListening() {
  if (!apiKey) { alert('Please enter your API key first.'); return; }
  if (selectedLangs.size === 0) { alert('Please select at least one target language.'); return; }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    setStatus('Speech recognition not supported. Use Chrome.', 'error');
    return;
  }

  const langSelect = document.getElementById('input-lang').value;
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = langSelect === 'auto' ? 'en-GB' : langSelect;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('mic-btn').textContent = '⏹';
    setStatus('Listening... speak now', 'active');
  };

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }

    const box = document.getElementById('transcript-box');
    box.classList.remove('empty');
    box.textContent = final || interim;

    if (final.trim().length > 3) {
      translateAll(final.trim(), langSelect);
    }
  };

  recognition.onerror = (e) => {
    setStatus(`Error: ${e.error}`, 'error');
    stopListening();
  };

  recognition.onend = () => {
    if (isListening) recognition.start(); // auto-restart
  };

  recognition.start();
}

function stopListening() {
  isListening = false;
  if (recognition) recognition.stop();
  document.getElementById('mic-btn').classList.remove('listening', 'translating');
  document.getElementById('mic-btn').textContent = '🎤';
  setStatus('Press mic to start speaking');
}

function setStatus(msg, type = '') {
  const el = document.getElementById('status-text');
  el.textContent = msg;
  el.className = 'status-text' + (type ? ' ' + type : '');
}

// ── Translation ────────────────────────────────────────
async function translateAll(text, inputLang) {
  if (!text || selectedLangs.size === 0) return;

  document.getElementById('mic-btn').classList.add('translating');
  setStatus('Translating...', 'active');
  sessionCount++;
  document.getElementById('session-info').textContent = `${sessionCount} translations`;

  // Set loading state on all cards
  selectedLangs.forEach(lang => {
    const el = document.getElementById(`trans-${lang.replace(/\s/g,'-')}`);
    if (el) { el.textContent = 'Translating...'; el.className = 'translated-text loading'; }
  });

  const langList = [...selectedLangs].join(', ');
  const sourceLang = inputLang === 'auto' ? 'auto-detect the source language' : (inputLang === 'sv-SE' ? 'Swedish' : 'English');

  const prompt = `You are a real-time translator at a school parent meeting. The speaker is using ${sourceLang}.

Translate the following into each of these languages: ${langList}

Return ONLY a JSON object with language names as keys and translations as values. No explanation. Example format:
{"Arabic": "...", "Somali": "..."}

Text to translate: "${text}"`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const rawText = data.content[0].text.trim();
    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Invalid response format');

    const translations = JSON.parse(jsonMatch[0]);

    selectedLangs.forEach(lang => {
      const el = document.getElementById(`trans-${lang.replace(/\s/g,'-')}`);
      const card = el?.closest('.translation-card');
      if (el && translations[lang]) {
        el.textContent = translations[lang];
        el.className = 'translated-text';
        card?.classList.add('fresh');
        setTimeout(() => card?.classList.remove('fresh'), 2000);
      }
    });

    addHistory(text, translations);
    setStatus('Translated — speak again when ready', 'active');

  } catch (err) {
    setStatus(`Translation error: ${err.message}`, 'error');
    selectedLangs.forEach(lang => {
      const el = document.getElementById(`trans-${lang.replace(/\s/g,'-')}`);
      if (el) { el.textContent = 'Error — try again'; el.className = 'translated-text loading'; }
    });
  }

  document.getElementById('mic-btn').classList.remove('translating');
}

// ── Text-to-Speech ─────────────────────────────────────
function speakTranslation(lang) {
  const el = document.getElementById(`trans-${lang.replace(/\s/g,'-')}`);
  if (!el || el.classList.contains('loading')) return;
  const text = el.textContent;
  if (!text || text === '—') return;

  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  window.speechSynthesis.speak(utter);
}

// ── History ────────────────────────────────────────────
function addHistory(original, translations) {
  const time = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  history.unshift({ time, original, translations });
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (history.length === 0) {
    list.innerHTML = '<div class="empty-state">No translations yet this session</div>';
    return;
  }
  list.innerHTML = history.slice(0, 20).map(item => `
    <div class="history-item">
      <div class="hi-meta">${item.time} · ${Object.keys(item.translations).join(', ')}</div>
      <div class="hi-text">${item.original}</div>
    </div>
  `).join('');
}

function clearHistory() {
  history = [];
  renderHistory();
}

// ── Boot ───────────────────────────────────────────────
init();
</script>
</body>
</html>
