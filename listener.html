<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Translator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%232563eb'/><stop offset='100%25' stop-color='%230ea5e9'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text y='.9em' font-size='72' x='50%25' text-anchor='middle'>🌐</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f7f9fc;--surface:#ffffff;--border:#e2e8f4;
    --accent:#2563eb;--accent2:#0ea5e9;--success:#10b981;--warn:#f59e0b;--danger:#ef4444;
    --text:#0f1929;--muted:#8096b4;--muted2:#4a6080;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
  body::before{content:'';position:fixed;top:0;left:0;right:0;height:260px;
    background:linear-gradient(160deg,#0f1929 0%,#1a2f5a 100%);z-index:0;pointer-events:none}

  /* ── Join ── */
  #join-screen{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .join-card{background:white;border-radius:24px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.12);max-width:420px;width:100%;text-align:center}
  .join-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 20px}
  .join-card h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-.03em;margin-bottom:6px}
  .join-card p{font-size:.9rem;color:var(--muted);margin-bottom:28px;line-height:1.6}
  .field{text-align:left;margin-bottom:16px}
  .field label{display:block;font-size:.78rem;font-weight:600;color:var(--muted2);margin-bottom:6px;letter-spacing:.02em}
  .field input,.field select{width:100%;background:var(--bg);border:1.5px solid var(--border);
    border-radius:10px;padding:13px 16px;color:var(--text);font-family:'DM Sans',sans-serif;
    font-size:.95rem;outline:none;transition:border-color .2s}
  .field input:focus,.field select:focus{border-color:var(--accent)}
  .join-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;border:none;border-radius:12px;padding:15px;font-family:'Syne',sans-serif;
    font-weight:700;font-size:1rem;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:8px}
  .join-btn:hover{opacity:.9}.join-btn:active{transform:scale(.98)}
  .join-err{color:var(--danger);font-size:.82rem;margin-top:10px;min-height:18px}

  /* ── Main ── */
  #main-screen{display:none;min-height:100vh;position:relative;z-index:1}
  .top-bar{position:relative;z-index:2;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
  .site-tag{font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;color:white}
  .room-tag{font-family:'DM Sans',sans-serif;font-size:.78rem;color:rgba(255,255,255,.5);
    background:rgba(255,255,255,.1);padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.15)}
  .leave-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
    color:rgba(255,255,255,.7);font-size:.78rem;padding:6px 14px;border-radius:8px;cursor:pointer}
  .leave-btn:hover{background:rgba(255,255,255,.2)}
  .content{max-width:600px;margin:0 auto;padding:20px 20px 48px}

  /* Status */
  .status-bar{background:white;border-radius:14px;padding:12px 18px;margin-bottom:16px;
    display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
  .sdot{width:9px;height:9px;border-radius:50%;background:var(--warn);flex-shrink:0;transition:background .3s}
  .sdot.ok{background:var(--success);animation:sb 3s infinite}
  .sdot.err{background:var(--danger)}
  @keyframes sb{0%,100%{opacity:1}50%{opacity:.4}}
  .stext{font-size:.83rem;color:var(--muted2)}
  .stext strong{color:var(--text)}

  /* Hero translation */
  .hero{background:white;border-radius:20px;padding:28px 28px 22px;
    box-shadow:0 4px 24px rgba(0,0,0,.07);margin-bottom:16px;min-height:180px;display:flex;flex-direction:column}
  .hero-lang{font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--accent2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .hero-lang::after{content:'';flex:1;height:1px;background:var(--border)}
  .hero-text{font-size:1.7rem;line-height:1.5;color:var(--text);flex:1;display:flex;align-items:center}
  .hero-text.waiting{font-size:1.05rem;color:var(--muted);font-style:italic}
  .hero-text.incoming{animation:fi .35s ease}
  @keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .hero-actions{display:flex;gap:10px;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
  .abtn{flex:1;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;
    border:none;border-radius:10px;padding:12px;font-family:'Syne',sans-serif;font-weight:700;
    font-size:.82rem;cursor:pointer;transition:opacity .2s}
  .abtn:hover{opacity:.88}

  /* Original */
  .orig-card{background:white;border-radius:14px;padding:16px 18px;
    box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:16px}
  .orig-label{font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
  .orig-text{font-size:.9rem;color:var(--muted2);line-height:1.6;font-style:italic}

  /* Language switcher */
  .lang-switch{background:white;border-radius:14px;padding:14px 18px;
    box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:16px;display:flex;align-items:center;gap:12px}
  .lang-switch label{font-size:.82rem;color:var(--muted2);white-space:nowrap;font-weight:500}
  .lang-switch select{flex:1;background:var(--bg);border:1.5px solid var(--border);
    border-radius:9px;padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;
    font-size:.88rem;outline:none;cursor:pointer}
  .lang-switch select:focus{border-color:var(--accent)}

  /* Extras */
  .extras-toggle{width:100%;background:none;border:1.5px dashed var(--border);border-radius:12px;
    padding:12px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.82rem;
    cursor:pointer;margin-bottom:16px;transition:all .2s}
  .extras-toggle:hover{border-color:var(--accent2);color:var(--accent2)}
  .extras-panel{display:none;margin-bottom:16px}
  .extras-panel.open{display:block}
  .chip-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
  .echip{background:white;border:1.5px solid var(--border);border-radius:8px;padding:7px 13px;
    font-size:.82rem;cursor:pointer;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .echip:hover{border-color:var(--accent2)}
  .echip.on{background:rgba(37,99,235,.06);border-color:var(--accent);color:var(--accent)}
  .extra-cards{display:flex;flex-direction:column;gap:10px}
  .xcard{background:white;border-radius:14px;padding:16px 18px;
    box-shadow:0 2px 12px rgba(0,0,0,.05);border-left:3px solid var(--accent2)}
  .xcard-lang{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:var(--accent2);margin-bottom:6px}
  .xcard-text{font-size:1.05rem;line-height:1.6;color:var(--text)}
  .xcard-text.waiting{color:var(--muted);font-style:italic;font-size:.88rem}

  .ts{font-size:.7rem;color:var(--muted);text-align:right;margin-top:4px}
</style>
</head>
<body>

<!-- JOIN -->
<div id="join-screen">
  <div class="join-card">
    <div class="join-logo">🌐</div>
    <h1>Meeting Translator</h1>
    <p>Enter the room code from your speaker, then choose your language.</p>
    <div class="field">
      <label>Room Code</label>
      <input type="text" id="j-room" placeholder="e.g. A11" maxlength="20"
        oninput="this.value=this.value.toUpperCase()" />
    </div>
    <div class="field">
      <label>Your Language</label>
      <select id="j-lang">
        <option value="">— Select your language —</option>
        <option>Albanian</option><option>Amharic</option><option>Arabic</option>
        <option>Dari</option><option>Dutch</option><option>Farsi</option>
        <option>French</option><option>German</option><option>Greek</option>
        <option>Hindi</option><option>Indonesian</option><option>Italian</option>
        <option>Japanese</option><option>Korean</option><option>Kurdish</option>
        <option>Malay</option><option>Norwegian</option><option>Polish</option>
        <option>Portuguese</option><option>Romanian</option><option>Russian</option>
        <option>Somali</option><option>Spanish</option><option>Swedish</option>
        <option>Tigrinya</option><option>Turkish</option><option>Ukrainian</option>
        <option>Urdu</option><option>Vietnamese</option>
        <option value="__custom__">Other — type below</option>
      </select>
    </div>
    <div class="field" id="custom-wrap" style="display:none">
      <label>Type your language</label>
      <input type="text" id="j-custom" placeholder="e.g. Tigrinya" />
    </div>
    <button class="join-btn" onclick="joinRoom()">Join Meeting</button>
    <div class="join-err" id="join-err"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <div class="top-bar">
    <div class="site-tag">🌐 Live Translator</div>
    <div class="room-tag" id="m-room-tag">—</div>
    <div style="display:flex;gap:8px;align-items:center">
      <a href="meeting.html" style="font-size:.72rem;color:rgba(255,255,255,.4);text-decoration:none;
        border:1px solid rgba(255,255,255,.12);padding:5px 10px;border-radius:7px">⇄ Meeting</a>
      <button class="leave-btn" onclick="leaveRoom()">Leave</button>
    </div>
  </div>
  <div class="content">
    <div class="status-bar">
      <div class="sdot" id="sdot"></div>
      <div class="stext" id="stext">Connecting...</div>
    </div>

    <div class="hero">
      <div class="hero-lang" id="hero-lang">Your Language</div>
      <div class="hero-text waiting" id="hero-text">Waiting for the speaker...</div>
      <div class="hero-actions">
        <button class="abtn" onclick="speakCurrent()">🔊 Read aloud</button>
      </div>
    </div>

    <div class="orig-card">
      <div class="orig-label">Original (speaker said)</div>
      <div class="orig-text" id="orig-text">—</div>
    </div>

    <div class="lang-switch">
      <label>My language:</label>
      <select id="lang-sel" onchange="changeLanguage()">
        <option value="">— Change —</option>
        <option>Albanian</option><option>Amharic</option><option>Arabic</option>
        <option>Dari</option><option>Dutch</option><option>Farsi</option>
        <option>French</option><option>German</option><option>Greek</option>
        <option>Hindi</option><option>Indonesian</option><option>Italian</option>
        <option>Japanese</option><option>Korean</option><option>Kurdish</option>
        <option>Malay</option><option>Norwegian</option><option>Polish</option>
        <option>Portuguese</option><option>Romanian</option><option>Russian</option>
        <option>Somali</option><option>Spanish</option><option>Swedish</option>
        <option>Tigrinya</option><option>Turkish</option><option>Ukrainian</option>
        <option>Urdu</option><option>Vietnamese</option>
      </select>
    </div>

    <button class="extras-toggle" id="extras-toggle" onclick="toggleExtras()">
      + Also show other languages
    </button>
    <div class="extras-panel" id="extras-panel">
      <div class="chip-row" id="chip-row"></div>
      <div class="extra-cards" id="extra-cards"></div>
    </div>

    <div class="ts" id="last-ts"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FB_CONFIG = {
  apiKey:      'AIzaSyAxu-jLi24nzfVr93CepVG6EZnY4t7aZ-o',
  authDomain:  'iesv-translator.firebaseapp.com',
  databaseURL: 'https://iesv-translator-default-rtdb.europe-west1.firebasedatabase.app',
  projectId:   'iesv-translator',
  appId:       '1:877155393473:web:13622664b9563976ac9940'
};

const ALL_LANGS = ['Albanian','Amharic','Arabic','Dari','Dutch','Farsi','French','German',
  'Greek','Hindi','Indonesian','Italian','Japanese','Korean','Kurdish','Malay','Norwegian',
  'Polish','Portuguese','Romanian','Russian','Somali','Spanish','Swedish','Tigrinya',
  'Turkish','Ukrainian','Urdu','Vietnamese'];

let db = null, myLang = '', myRoom = '', connId = '';
let currentTranslation = '', lastTranslations = {};
let extraLangs = new Set();
let extrasOpen = false;

window.addEventListener('load', () => {
  // Custom lang toggle
  document.getElementById('j-lang').addEventListener('change', function() {
    document.getElementById('custom-wrap').style.display =
      this.value === '__custom__' ? 'block' : 'none';
  });
  // URL room code
  const p = new URLSearchParams(window.location.search);
  if (p.get('room')) document.getElementById('j-room').value = p.get('room').toUpperCase();
  // Saved language
  const saved = localStorage.getItem('lt_lang');
  if (saved) {
    const sel = document.getElementById('j-lang');
    [...sel.options].forEach(o => { if (o.text === saved) sel.value = o.value || o.text; });
  }
});

// ── Join ──────────────────────────────────────────────
window.joinRoom = async function() {
  const room = document.getElementById('j-room').value.trim().toUpperCase();
  const sel = document.getElementById('j-lang').value;
  const lang = sel === '__custom__' ? document.getElementById('j-custom').value.trim() : sel;
  const err = document.getElementById('join-err');
  if (!room) { err.textContent = 'Please enter a room code.'; return; }
  if (!lang) { err.textContent = 'Please select your language.'; return; }
  err.textContent = '';
  localStorage.setItem('lt_lang', lang);

  try {
    const app = initializeApp({...FB_CONFIG}, 'lt-l-' + Date.now());
    db = getDatabase(app);
    connId = 'l-' + Math.random().toString(36).slice(2, 8);
    myRoom = room; myLang = lang;

    // Register — speaker reads all connections and translates into their languages
    await set(ref(db, `rooms/${room}/connections/${connId}`), { lang, joined: Date.now() });

    // Listen for translations
    onValue(ref(db, `rooms/${room}/latest`), snap => {
      if (snap.exists()) handleUpdate(snap.val());
    });

    document.getElementById('join-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    document.getElementById('m-room-tag').textContent = room;
    document.getElementById('hero-lang').textContent = lang;
    document.getElementById('lang-sel').value = lang;
    setStatus('ok', `Connected · <strong>${lang}</strong>`);

    window.addEventListener('beforeunload', cleanup);
  } catch(e) {
    err.textContent = 'Connection failed: ' + e.message;
  }
};

// ── Handle update ─────────────────────────────────────
function handleUpdate(data) {
  if (!data.text || !data.translations) return;
  lastTranslations = data.translations;

  const t = data.translations[myLang];
  const el = document.getElementById('hero-text');
  if (t) {
    currentTranslation = t;
    el.textContent = t;
    el.className = 'hero-text incoming';
    setTimeout(() => el.classList.remove('incoming'), 500);
    setStatus('ok', `Connected · <strong>${myLang}</strong>`);
  } else {
    el.textContent = 'Your language is registered — translation will appear on the next phrase.';
    el.className = 'hero-text waiting';
  }

  document.getElementById('orig-text').textContent = data.text;
  const time = new Date(data.ts).toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('last-ts').textContent = 'Last updated ' + time;
  updateExtraCards();
}

// ── Extras ────────────────────────────────────────────
function renderChips() {
  const row = document.getElementById('chip-row');
  row.innerHTML = '';
  ALL_LANGS.filter(l => l !== myLang).forEach(lang => {
    const c = document.createElement('div');
    c.className = 'echip' + (extraLangs.has(lang) ? ' on' : '');
    c.textContent = lang;
    c.onclick = () => { extraLangs.has(lang) ? extraLangs.delete(lang) : extraLangs.add(lang); renderChips(); updateExtraCards(); };
    row.appendChild(c);
  });
}

function updateExtraCards() {
  const container = document.getElementById('extra-cards');
  container.innerHTML = '';
  extraLangs.forEach(lang => {
    const t = lastTranslations[lang];
    const card = document.createElement('div');
    card.className = 'xcard';
    card.innerHTML = `<div class="xcard-lang">${lang}</div>
      <div class="xcard-text ${t ? '' : 'waiting'}">${t || 'Waiting for next translation...'}</div>`;
    container.appendChild(card);
  });
}

window.toggleExtras = function() {
  extrasOpen = !extrasOpen;
  document.getElementById('extras-panel').classList.toggle('open', extrasOpen);
  document.getElementById('extras-toggle').textContent =
    extrasOpen ? '− Hide other languages' : '+ Also show other languages';
  if (extrasOpen) renderChips();
};

// ── Helpers ───────────────────────────────────────────
function setStatus(type, msg) {
  document.getElementById('sdot').className = 'sdot' + (type === 'ok' ? ' ok' : type === 'err' ? ' err' : '');
  document.getElementById('stext').innerHTML = msg;
}

window.speakCurrent = function() {
  if (!currentTranslation) return;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(new SpeechSynthesisUtterance(currentTranslation));
};

window.changeLanguage = async function() {
  const sel = document.getElementById('lang-sel').value;
  if (!sel || sel === myLang) return;
  myLang = sel;
  localStorage.setItem('lt_lang', sel);
  document.getElementById('hero-lang').textContent = sel;
  document.getElementById('hero-text').textContent = 'Waiting for next phrase in ' + sel + '...';
  document.getElementById('hero-text').className = 'hero-text waiting';
  setStatus('ok', `Connected · <strong>${sel}</strong>`);
  if (db && myRoom && connId) {
    await set(ref(db, `rooms/${myRoom}/connections/${connId}`), { lang: sel, joined: Date.now() });
  }
  renderChips();
};

function cleanup() {
  if (db && myRoom && connId) remove(ref(db, `rooms/${myRoom}/connections/${connId}`));
}

window.leaveRoom = function() {
  cleanup();
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('join-screen').style.display = 'flex';
};
</script>
</body>
</html>
